<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>鹿田弓道部 新歓2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap');
    :root { --bg: #568670; --pop-pink: #FF87B2; --pop-yellow: #FFD93D; }
    body { background-color: var(--bg); font-family: 'M PLUS Rounded 1c', sans-serif; color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    #interactive-bg { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px); background-size: 20px 20px; }
    .view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
    .view.active { display: block; animation: viewIn 0.3s; }
    @keyframes viewIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .header-box { background: var(--pop-pink); border: 4px solid #333; box-shadow: 4px 4px 0px #333; padding: 15px; text-align: center; transform: rotate(-1deg); margin-bottom: 30px; }
    .header-box h1 { font-size: 1.5rem; font-weight: 900; color: white; -webkit-text-stroke: 1.5px #333; }
    .pop-card { background: white; border: 4px solid #333; box-shadow: 6px 6px 0px #333; border-radius: 15px; color: #333; padding: 20px; margin-bottom: 20px; position: relative; }
    #calendar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    @media (min-width: 480px) { #calendar { grid-template-columns: repeat(7, 1fr); gap: 20px; } }
    .day-item { position: relative; display: flex; align-items: center; justify-content: center; min-height: 80px; }
    .mato { position: relative; width: 68px; height: 68px; border-radius: 50%; border: 3px solid #333; box-shadow: 3px 3px 0px rgba(0,0,0,0.2); background: white; transition: 0.2s; }
    .mato.kasumimato { background: radial-gradient(circle, #fff 0% 8%, #333 9% 23%, #fff 24% 39%, #333 40% 55%, #fff 56% 71%, #333 72% 87%, #fff 88% 100%); }
    .mato.hoshimato { background: radial-gradient(circle, #333 18%, #fff 19% 100%); }
    .day-item:not(.full):hover .mato { transform: scale(1.05); cursor: pointer; border-color: var(--pop-pink); }
    .day-item.full .mato { filter: grayscale(1) opacity(0.3); }
    .arrow::after { content: ''; position: absolute; top: 34px; left: 34px; width: 50px; height: 3px; background: #8B4513; transform-origin: left center; transform: rotate(-45deg); border: 0.5px solid #333; z-index: 5; }
    .arrow::before { content: ''; position: absolute; top: -1px; left: 69px; width: 15px; height: 18px; background: #fff; clip-path: polygon(100% 100%, 0% 100%, 25% 50%, 0% 0%, 100% 0%, 75% 50%); transform: translate(-50%, -50%) rotate(-45deg); border: 1px solid #333; z-index: 6; }
    .date-label { position: absolute; bottom: -2px; right: -12px; font-size: 17px; color: white; -webkit-text-stroke: 1px #333; font-weight: 900; z-index: 10; }
    .slots-badge { position: absolute; top: -10px; left: -10px; padding: 2px 6px; border: 2.5px solid #333; border-radius: 6px; font-size: 10px; font-weight: 900; box-shadow: 2px 2px 0px #333; z-index: 10; transform: rotate(-10deg); background: var(--pop-yellow); color: #333; }
    .badge-full { background: #FF4B4B; color: white; }
    input, select { width: 100%; border: 3px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; background: #fff; font-size: 1rem; color: #333; outline: none; }
    .btn-main { background: var(--pop-yellow); border: 3px solid #333; padding: 15px; border-radius: 50px; font-weight: 900; width: 100%; box-shadow: 4px 4px 0px #333; color: #333; font-size: 1.2rem; cursor: pointer; }
    .btn-main:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px #333; }
    .btn-sub { font-size: 12px; color: #eee; text-decoration: underline; margin-top: 25px; display: block; text-align: center; cursor: pointer; }
  </style>
</head>
<body>
  <div id="interactive-bg"></div>

  <div id="view-main" class="view active">
    <div class="header-box"><h1>SHIKATA KYUDO</h1></div>
    <div id="recheck" class="hidden pop-card bg-black text-yellow-300 text-center border-4 border-yellow-300">
      <p id="savedInfo" class="text-6xl font-black mb-1"></p>
      <p class="text-xs font-bold mb-3">学番とこの番号をスクショしてね！📸</p>
      <button onclick="switchView('view-cancel')" class="text-[10px] underline text-gray-400">Cancel</button>
    </div>
    <div class="pop-card bg-purple-50 text-sm"><ul id="notices" class="space-y-1 pl-4 font-bold text-purple-900 list-disc"><li>Loading...🎯</li></ul></div>
    <div id="calendar" class="mb-20"></div>
    <span onclick="switchView('view-cancel')" class="block text-center text-xs opacity-30 underline cursor-pointer mt-20">Admin: Cancel</span>
  </div>

  <div id="view-form" class="view">
    <div class="pop-card">
      <h2 id="fTitle" class="font-black text-xl mb-6 text-pink-500 text-center pb-2 border-b-2"></h2>
      <form id="reservationForm">
        <input type="hidden" id="fDate"><input type="hidden" id="fEvent">
        <input type="text" id="name" placeholder="氏名" required>
        <input type="text" id="kana" placeholder="よみがな" required>
        <select id="major" required>
          <option value="" disabled selected>学科を選択</option>
          <option>医</option><option>歯</option><option>看護</option><option>検査</option><option>放射</option>
        </select>
        <input type="text" id="studentId" placeholder="学籍番号 (T26XXXX)" required>
        <input type="text" id="contact" placeholder="インスタID or メール" required>
        <button type="submit" id="subBtn" class="btn-main">Book Now! 🎯</button>
        <button type="button" onclick="switchView('view-main')" class="block w-full text-center mt-6 text-gray-400 underline text-xs">Back</button>
      </form>
    </div>
  </div>

  <div id="view-success" class="view">
    <div class="pop-card text-center bg-black border-yellow-400 shadow-[8px_8px_0px_#FFD93D]">
      <div class="text-6xl mb-6">🎰</div>
      <h2 class="font-black text-3xl mb-1 italic text-yellow-300">BINGO!</h2>
      <div class="bg-white p-8 rounded-xl my-6 border-4 border-black"><p id="sDisp" class="text-8xl font-black text-pink-500"></p></div>
      <p class="text-sm font-black text-yellow-300">今すぐスクリーンショット！📸</p>
      <button onclick="location.reload()" class="btn-main bg-white text-black mt-10">OK!</button>
    </div>
  </div>

  <div id="view-cancel" class="view">
    <div class="pop-card">
      <h2 class="font-black text-xl mb-6 text-red-500 text-center uppercase border-b-2 pb-2">Cancel Ticket</h2>
      <form id="cancelForm">
        <input type="number" id="cSerial" placeholder="受付番号" required>
        <input type="text" id="cStudentId" placeholder="学籍番号" required>
        <button type="submit" id="canBtn" class="btn-main bg-red-400 text-white border-black">Cancel</button>
        <button type="button" onclick="switchView('view-main')" class="block w-full text-center mt-6 text-gray-400 underline text-xs">Back</button>
      </form>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwyQxzC9rh9iyO_zriJnmiXiYpK0G8YRNhD5KbR2J9AzNHlGLEo-fSwQrqhe75BRHFW8g/exec";

    function switchView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({top:0, behavior:'smooth'});
    }

    async function apiRequest(payload) {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      return await res.json();
    }

    window.onload = async () => {
      try {
        const saved = JSON.parse(localStorage.getItem('kyudo_booking'));
        if(saved && saved.serial) {
          document.getElementById('recheck').classList.remove('hidden');
          document.getElementById('savedInfo').innerText = `No.${saved.serial}`;
        }
      } catch(e) {}
      
      try {
        const res = await fetch(GAS_URL + "?action=getInitialData").then(r => r.json());
        const c = document.getElementById('calendar');
        c.innerHTML = '';
        res.calendar.forEach(i => {
          const item = document.createElement('div');
          const full = i.max > 0 && i.remaining <= 0;
          item.className = `day-item ${full ? 'full' : ''}`;
          item.innerHTML = `<span class="date-label">${i.day}</span><div class="mato ${i.hasArrow ? 'kasumimato arrow' : 'hoshimato'}"></div>`;
          if(i.name) {
            const b = document.createElement('div');
            b.className = `slots-badge ${full ? 'badge-full' : ''}`;
            b.innerText = full ? '満' : (i.max > 0 ? `${i.remaining}` : '◎');
            if(!full) item.onclick = () => {
              document.getElementById('fTitle').innerText = `${i.day}日: ${i.name}`;
              document.getElementById('fDate').value = i.date;
              document.getElementById('fEvent').value = i.name;
              switchView('view-form');
            };
            item.appendChild(b);
          }
          c.appendChild(item);
        });
        document.getElementById('notices').innerHTML = res.notices.map(n => `<li>📢 <strong>${n.title}:</strong> ${n.content}</li>`).join('');
      } catch(e) { document.getElementById('notices').innerText = "接続エラー🎯"; }
    };

    document.getElementById('reservationForm').onsubmit = async (e) => {
      e.preventDefault();
      const b = document.getElementById('subBtn'); b.innerText = "SENDING..."; b.disabled = true;
      try {
        const r = await apiRequest({ action: "processForm", payload: {
          date: document.getElementById('fDate').value, eventName: document.getElementById('fEvent').value, name: document.getElementById('name').value, kana: document.getElementById('kana').value, major: document.getElementById('major').value, studentId: document.getElementById('studentId').value, contact: document.getElementById('contact').value
        }});
        if(r.error) throw new Error(r.error);
        document.getElementById('sDisp').innerText = r.serial;
        localStorage.setItem('kyudo_booking', JSON.stringify(r));
        switchView('view-success');
      } catch(err) { alert(err.message); b.innerText = "RETRY!"; b.disabled = false; }
    };

    document.getElementById('cancelForm').onsubmit = async (e) => {
      e.preventDefault();
      if(!confirm("キャンセルしますか？")) return;
      try {
        const r = await apiRequest({ action: "cancelBooking", payload: { serial: document.getElementById('cSerial').value, studentId: document.getElementById('cStudentId').value }});
        if(r.error) throw new Error(r.error);
        alert(r.message); localStorage.removeItem('kyudo_booking'); location.reload();
      } catch(err) { alert(err.message); }
    };
  </script>
</body>
</html>
